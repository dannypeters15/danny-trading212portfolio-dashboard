<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trading 212 Portfolio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F1F5F9;font-family:'Courier New',monospace;color:#0F172A;font-size:15px}
.app{padding:18px 22px;max-width:1800px;margin:0 auto
.hdr{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid #CBD5E1;border-radius:12px;padding:16px 24px;margin-bottom:12px;gap:16px;flex-wrap:wrap}
.brand{font-size:22px;font-weight:700;color:#1E3A8A}
.brand-meta{display:flex;flex-direction:column;gap:3px}
.brand-sub-row{display:flex;align-items:center;gap:8px;margin-top:4px}
.live-badge{display:inline-flex;align-items:center;gap:5px;background#F0FDF4;border:1px solid #86EFAC;border-radius:20px;padding:3px 10px;font-size:11px;color:#15803D;font-weight:600}
.live-badge.stale{background:#FEF3C7;border-color:#FCD34D;color:#92400E}
.live-badge.loading{background:#EFF6FF;border-color:#BFDBFE;color:#1D4ED8}
.live-dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.brand-sub{font-size:11px;color:#94A3B8}
.pval-wrap{text-align:right}
.pval-label{font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:1px}
.pval-num{font-size:28px;font-weight:700}
.pval-fx{font-size:11px;color:#94A3B8;margin-top:2px}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px}
@media(max-width:900px){.stats{grid-template-columns:repeat(4,minmax(0,1fr))}}
.stat{background:#fff;border:1px solid #CBD5E1;border-radius:8px;padding:10px 14px}
.stat.warn{border-color:#FCA5A5;background:#FEF2F2}
.stat-lbl{font-size:9px;color:#94A3B8;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.stat-val{font-size:18px;font-weight:700}
.alerts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.alert{border-radius:6px;padding:7px 13px;font-size:11px}
.alert.red{background:#FEF2F2;border:1px solid #FCA5A5;color:#991B1B}
.alert.amber{background:#FEF3C7;border:1px solid #FCD34D;color:#92400E}
.alert.green{background:#F0FDF4;border:1px solid #86EFAC;color:#14532D}
.tab-bar{display:flex;background:#fff;border:1px solid #CBD5E1;border-radius:8px;padding:0 6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:12px 16px;font-size:11px;color:#94A3B8;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;margin-bottom:-1px;flex-shrink:0;transition:color .15s}
.tab.active{color:#1D4ED8;border-bottom-color:#1D4ED8;font-weight:700}
.tab:hover:not(.active){color:#475569}
.card{background:#fff;border:1px solid #CBD5E1;border-radius:12px;padding:18px 22px;margin-bottom:14px}
.card-title{font-size:12px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px}
.chart-hint{font-size:11px;color:#94A3B8;margin-bottom:12px;line-height:1.6}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:700px){.g2{grid-template-columns:1fr}}
.leg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;font-size:11px;color:#475569}
.leg-sq{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:3px;vertical-align:middle}
.tk-leg{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:3px 6px;margin-top:10px}
.tk-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#475569;overflow:hidden}
.tk-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tk-txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl-wrap{overflow-x:auto;max-height:500px;overflow-y:auto}
table{width:100%;border-collapse:collapse}
th{padding:9px 10px;text-align:left;color:#64748B;font-size:10px;font-weight:700;letter-spacing:.8px;border-bottom:2px solid #F1F5F9;background:#F8FAFC;text-transform:uppercase;white-space:nowrap;position:sticky;top:0;z-index:1}
th.r{text-align:right}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:#1D4ED8;background:#EFF6FF}
td{padding:7px 10px;border-bottom:1px solid #F8FAFC;white-space:nowrap;font-size:12px}
td.r{text-align:right}
tr:hover td{background:#F8FAFC}
.tk-chip{display:inline-block;background:#EFF6FF;color:#1D4ED8;border-radius:3px;padding:2px 8px;font-weight:700;font-size:11px}
.stale-chip{display:inline-block;background:#FEF3C7;color:#92400E;border-radius:3px;padding:1px 6px;font-size:9px;margin-left:3px}
.manual-chip{display:inline-block;background:#FDF4FF;color:#7C3AED;border-radius:3px;padding:1px 6px;font-size:9px;margin-left:3px}
.inp{background:#F8FAFC;border:1px solid #E2E8F0;color:#0F172A;padding:5px 7px;border-radius:4px;font-size:11px;font-family:inherit;outline:none;width:82px}
.inp:focus{border-color:#1D4ED8;background:#fff}
.inp-tk{color:#1D4ED8;font-weight:700;width:58px}
.inp-cat{width:200px;font-size:11px}
.inp-sm{width:68px}
.inp-xs{width:54px}
.inp-lg{width:220px}
.btn{border-radius:6px;padding:9px 18px;font-size:12px;font-family:inherit;font-weight:700;cursor:pointer;border:none}
.btn-blue{background:#1D4ED8;color:#fff}.btn-blue:hover{background:#1E40AF}
.btn-green{background:#059669;color:#fff}
.btn-grey{background:transparent;color:#64748B;border:1px solid #CBD5E1}.btn-grey:hover{background:#F8FAFC}
.btn-red{background:transparent;color:#DC2626;border:1px solid #FCA5A5}.btn-red:hover{background:#FEF2F2}
.btn-sm{padding:6px 12px;font-size:11px}
.del-btn{background:transparent;border:1px solid #FCA5A5;color:#DC2626;border-radius:4px;padding:4px 9px;font-size:11px;cursor:pointer;font-family:inherit}
.del-btn:hover{background:#FEF2F2}
.dca-row{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;align-items:flex-end}
.dca-grp{display:flex;flex-direction:column;gap:5px}
.dca-lbl{font-size:11px;color:#64748B;text-transform:uppercase;letter-spacing:.5px}
.dca-inp{background:#fff;border:1px solid #CBD5E1;color:#0F172A;padding:9px 12px;border-radius:8px;font-size:14px;font-family:inherit;outline:none;width:170px}
.pos{color:#16A34A;font-weight:700}
.neg{color:#DC2626;font-weight:700}
.muted{color:#94A3B8}
.empty{text-align:center;padding:40px;color:#94A3B8;font-size:13px;line-height:2}
.empty span{color:#1D4ED8;font-weight:700}
.ed-tip{margin-top:14px;font-size:11px;color:#94A3B8;line-height:1.8;border-top:1px solid #F1F5F9;padding-top:12px}
.ed-field-guide{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:13px 17px;margin-bottom:14px;font-size:11px;line-height:2;color:#475569}
.ed-field-guide strong{color:#0F172A}
canvas{display:block}
.mode-toggle{display:flex;gap:4px;background:#E2E8F0;border-radius:8px;padding:3px;margin-bottom:14px}
.mode-btn{padding:5px 18px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:transparent;color:#64748B;transition:all .15s}
.mode-btn.active{background:#fff;color:#1D4ED8;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.wl-slider-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #F1F5F9;font-size:12px}
.tk-chip{display:inline-block;background:#EFF6FF;color:#1D4ED8;border-radius:4px;padding:2px 8px;font-weight:700;font-size:11px;letter-spacing:.3px}
.heat-td{font-size:12px;border-bottom:1px solid #F8FAFC;white-space:nowrap;text-align:right;padding:5px 8px;font-weight:600}
/* Category manager */
.cat-section{border:1px solid #E2E8F0;border-radius:10px;overflow:hidden;margin-bottom:14px}
.cat-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#F8FAFC;cursor:pointer;user-select:none}
.cat-header:hover{background:#F1F5F9}
.cat-header-title{font-size:12px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:1px}
.cat-body{padding:14px 16px;display:none}
.cat-body.open{display:block}
.cat-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #F8FAFC}
.cat-swatch{width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;padding:0;flex-shrink:0}
.cat-inp-full{flex:1;min-width:160px}
.cat-inp-short{width:100px}
.cat-add-row{display:flex;align-items:center;gap:10px;padding-top:12px;margin-top:6px;border-top:1px solid #F1F5F9;flex-wrap:wrap}
.loading-overlay{position:fixed;inset:0;background:rgba(241,245,249,.88);display:flex;align-items:center;justify-content:center;z-index:100;font-size:15px;color:#1D4ED8;font-family:inherit}
.loading-spinner{width:22px;height:22px;border:2px solid #BFDBFE;border-top-color:#1D4ED8;border-radius:50%;animation:spin .7s linear infinite;margin-right:14px}
@keyframes spin{to{transform:rotate(360deg)}}

.wl-slider-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #F1F5F9;font-size:12px}</style>
</head>

<div id="loading-overlay" class="loading-overlay">
  <div class="loading-spinner"></div>Loading live market data…
</div>
<div class="app">
  <div class="mode-toggle"><button class="mode-btn active" id="btn-portfolio" onclick="setMode('portfolio')">◎ Portfolio</button><button class="mode-btn" id="btn-watchlist" onclick="setMode('watchlist')">◉ Watchlist</button></div>
<div class="hdr">
    <div class="brand-meta">
      <div class="brand">TRADING 212 PORTFOLIO</div>
      <div class="brand-sub-row">
        <span id="live-badge" class="live-badge loading"><span class="live-dot"></span>Loading…</span>

  <div id="content"></div>

<div id="watchlist-section" style="display:none"><div class="card" style="padding:0;margin-bottom:14px"><div class="tab-bar"><button class="tab wl-tab active" data-tab="Overview" onclick="wlSetTab('Overview')">OVERVIEW</button><button class="tab wl-tab" data-tab="Returns" onclick="wlSetTab('Returns')">RETURNS</button><button class="tab wl-tab" data-tab="Upside" onclick="wlSetTab('Upside')">UPSIDE</button><button class="tab wl-tab" data-tab="Editor" onclick="wlSetTab('Editor')">EDITOR</button></div></div><div id="wl-content"></div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ── Default categories (stored in localStorage, fully editable) ──────────
const DEFAULT_CATS=[
  {id:'c1',fullName:'AI Infrastructure & Data Centres',shortName:'AI Infra',  color:'#0EA5E9'},
  {id:'c2',fullName:'Consumer & Lifestyle',             shortName:'Consumer',  color:'#F97316'},
  {id:'c3',fullName:'Consumer Internet / Platforms',    shortName:'Internet',  color:'#14B8A6'},
  {id:'c4',fullName:'Critical Materials',               shortName:'Materials', color:'#D97706'},
  {id:'c5',fullName:'Defence & Aerospace',              shortName:'Defence',   color:'#78909C'},
  {id:'c6',fullName:'Fintech',                          shortName:'Fintech',   color:'#F59E0B'},
  {id:'c7',fullName:'Gaming',                           shortName:'Gaming',    color:'#8B5CF6'},
  {id:'c8',fullName:'Nuclear',                          shortName:'Nuclear',   color:'#22C55E'},
  {id:'c9',fullName:'Semiconductors & Hardware',        shortName:'Semis',     color:'#EC4899'},
];
let categories=[];
function loadCategories(){
  const s=localStorage.getItem('t212-categories-v1');
  categories=s?JSON.parse(s):[...DEFAULT_CATS.map(c=>({...c}))];
}
function saveCategories(){localStorage.setItem('t212-categories-v1',JSON.stringify(categories));}
function getCatColor(fullName){return categories.find(c=>c.fullName===fullName)?.color||'#94A3B8';}
function getCatShort(fullName){return categories.find(c=>c.fullName===fullName)?.shortName||fullName;}

// ── Constants ─────────────────────────────────────────────────────────────
const TABS=['Overview','Upside','ATH Analysis','Returns','P&L','Editor'];
const RL=['1W','1M','3M','6M','1Y','3Y','5Y'];
const POS='#16A34A',NEG='#DC2626',ACCENT='#1D4ED8',TEXT='#0F172A',MUTED='#64748B',BORDER='#CBD5E1',GC='rgba(203,213,225,.5)';
const TS={color:MUTED,font:{family:"'Courier New',monospace",size:11}};
const CB={
  responsive:true,maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',borderColor:BORDER,borderWidth:1,titleColor:TEXT,bodyColor:MUTED,padding:10,titleFont:{family:"'Courier New',monospace",size:12},bodyFont:{family:"'Courier New',monospace",size:11}}},
  scales:{x:{ticks:TS,grid:{color:GC}},y:{ticks:TS,grid:{color:GC}}}
};

// ── State ─────────────────────────────────────────────────────────────────
let portfolio=[],liveData=null,activeTab='Overview',charts={},nextId=31,sortStates={},catOpen=false;

// ── Default portfolio ─────────────────────────────────────────────────────
const INIT_PORTFOLIO=[
  {id:1, ticker:'APLD', category:'AI Infrastructure & Data Centres', shares:13.48938095,  costBasis:299.55,  athHoldingValue:null,  manualHolding:null},
  {id:2, ticker:'ORCL', category:'AI Infrastructure & Data Centres', shares:13.69528169,  costBasis:1524.85, athHoldingValue:2784,  manualHolding:null},
  {id:3, ticker:'IREN', category:'AI Infrastructure & Data Centres', shares:63.20356429,  costBasis:2703.93, athHoldingValue:308,   manualHolding:null},
  {id:31,ticker:'PLTR', category:'AI Infrastructure & Data Centres', shares:50.03546248,  costBasis:4992.50, athHoldingValue:null,  manualHolding:null},
  {id:32,ticker:'CRWV', category:'AI Infrastructure & Data Centres', shares:11.96354018,  costBasis:998.50,  athHoldingValue:null,  manualHolding:null},
  {id:5, ticker:'MSFT', category:'Consumer Internet / Platforms',    shares:4.94976036,   costBasis:1408.22, athHoldingValue:1671,  manualHolding:null},
  {id:6, ticker:'ADBE', category:'Consumer Internet / Platforms',    shares:1.14122038,   costBasis:199.70,  athHoldingValue:608,   manualHolding:null},
  {id:8, ticker:'GOOGL',category:'Consumer Internet / Platforms',    shares:2.75381883,   costBasis:577.31,  athHoldingValue:1005,  manualHolding:null},
  {id:9, ticker:'AMZN', category:'Consumer Internet / Platforms',    shares:4.29428423,   costBasis:680.78,  athHoldingValue:810,   manualHolding:null},
  {id:12,ticker:'SNAP', category:'Consumer Internet / Platforms',    shares:66.23226651,  costBasis:249.62,  athHoldingValue:2790,  manualHolding:null},
  {id:13,ticker:'NFLX', category:'Consumer Internet / Platforms',    shares:7.08247318,   costBasis:506.00,  athHoldingValue:1402,  manualHolding:null},
  {id:14,ticker:'ALOY', category:'Critical Materials',               shares:70.09159585,  costBasis:499.25,  athHoldingValue:null,  manualHolding:494.22},
  {id:15,ticker:'FLY',  category:'Defence & Aerospace',              shares:13.68887445,  costBasis:374.44,  athHoldingValue:476,   manualHolding:317.67},
  {id:33,ticker:'AVAV', category:'Defence & Aerospace',              shares:4.03305757,   costBasis:499.25,  athHoldingValue:null,  manualHolding:null},
  {id:20,ticker:'SMR',  category:'Nuclear',                          shares:201.42251056, costBasis:1725.05, athHoldingValue:18219, manualHolding:null},
  {id:21,ticker:'OKLO', category:'Nuclear',                          shares:89.94751842,  costBasis:4344.49, athHoldingValue:12616, manualHolding:null},
  {id:22,ticker:'LTBR', category:'Nuclear',                          shares:22.76495738,  costBasis:199.70,  athHoldingValue:null,  manualHolding:null},
  {id:23,ticker:'NVA',  category:'Nuclear',                          shares:47.01514952,  costBasis:199.70,  athHoldingValue:null,  manualHolding:208.32},
  {id:24,ticker:'UEC',  category:'Nuclear',                          shares:189.84739854, costBasis:1987.01, athHoldingValue:2584,  manualHolding:null},
  {id:26,ticker:'LEU',  category:'Nuclear',                          shares:34.86910192,  costBasis:5469.69, athHoldingValue:null,  manualHolding:null},
  {id:28,ticker:'NVDA', category:'Semiconductors & Hardware',        shares:3.46520585,   costBasis:438.26,  athHoldingValue:586,   manualHolding:null},
  {id:29,ticker:'AVGO', category:'Semiconductors & Hardware',        shares:1.68475808,   costBasis:380.20,  athHoldingValue:915,   manualHolding:null},
];

// ── Data helpers ──────────────────────────────────────────────────────────
function toLiveGBP(price,currency){
  if(!liveData||!price)return 0;
  const g=liveData.gbpusd||1.26,e=liveData.eurusd||1.08;
  if(currency==='GBP')return price;
  if(currency==='EUR')return price/(g/e);
  return price/g;
}

function computed(){
  const en=portfolio.map(p=>{
    const live=liveData?.tickers?.[p.ticker]||{};
    const price=live.price||0,curr=live.currency||'USD';
    const priceGBP=toLiveGBP(price,curr);
    const usingManual=p.manualHolding!=null;
    const currentHolding=usingManual?p.manualHolding:(p.shares!=null?p.shares*priceGBP:0);

    // ATH: live athPrice × shares if available, else stored athHoldingValue fallback
    const athPriceGBP=live.athPrice?toLiveGBP(live.athPrice,curr):null;
    const athHoldingValue=(athPriceGBP&&p.shares!=null)
      ?p.shares*athPriceGBP
      :(p.athHoldingValue||null);

    const cb=p.costBasis||null;
    const unrealisedPL=cb!=null?currentHolding-cb:null;
    const unrealisedPLPct=(cb&&cb>0)?((currentHolding-cb)/cb)*100:null;
    const analystTarget=live.analystTarget||null;
    const upside=(analystTarget&&price)?((analystTarget-price)/price)*100:null;
    const mktCapB=live.mktCapB||null;
    const returns=live.returns||Object.fromEntries(RL.map(l=>[l,null]));
    return{...p,price,priceGBP,currency:curr,currentHolding,usingManual,
      athHoldingValue,unrealisedPL,unrealisedPLPct,
      analystTarget,mktCapB,returns,upside,stale:live.stale||false};
  });
  const tc=en.reduce((s,p)=>s+(p.currentHolding||0),0);
  const pos=en.filter(p=>p.currentHolding>0.5).length;
  const tath=en.reduce((s,p)=>s+(p.athHoldingValue||0),0);
  const tpl=en.reduce((s,p)=>s+(p.unrealisedPL||0),0);
  const wu=en.filter(p=>p.upside!=null&&p.currentHolding>0.5);
  const wt=wu.reduce((s,p)=>s+p.currentHolding,0);
  const avgUp=wt>0?wu.reduce((s,p)=>s+p.upside*p.currentHolding,0)/wt:0;
  const fin=en.map(p=>({...p,
    curPct:tc>0?p.currentHolding/tc*100:0,
    drawdown:p.athHoldingValue>0?((p.currentHolding-p.athHoldingValue)/p.athHoldingValue)*100:null
  }));
  return{tc,pos,tath,tpl,avgUp,en:fin};
}

function agg(en,fn){
  const m={};
  en.forEach(p=>{
    if(!m[p.category])m[p.category]={name:getCatShort(p.category),fullName:p.category,value:0,color:getCatColor(p.category)};
    m[p.category].value+=fn(p);
  });
  return Object.values(m).filter(s=>s.value>0.01);
}

function mkLeg(items){return`<div class="leg">${items.map(i=>`<span><span class="leg-sq" style="background:${i.color}"></span>${i.name}</span>`).join('')}</div>`;}
function sCard(l,v,c,w){return`<div class="stat${w?' warn':''}"><div class="stat-lbl">${l}</div><div class="stat-val" style="color:${c||TEXT}">${v}</div></div>`;}
function fp(v){return v==null?'-':(v>0?'+':'')+v.toFixed(1)+'%';}
function fc(v){return v==null?MUTED:v>0?POS:v<0?NEG:MUTED;}
function fgbp(v){return'£'+Math.abs(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}

// ── Sort helpers - supports nested paths like "returns.1Y" ────────────────
function getVal(obj,path){
  // Handles dot-notation paths e.g. "returns.1Y"
  return path.split('.').reduce((o,k)=>o==null?null:o[k],obj);
}
function getSorted(arr,tab,defField){
  const s=sortStates[tab]||{field:defField||'currentHolding',dir:'desc'};
  return[...arr].sort((a,b)=>{
    let va=getVal(a,s.field),vb=getVal(b,s.field);
    if(va==null&&vb==null)return 0;
    if(va==null)return 1;
    if(vb==null)return-1;
    const cmp=typeof va==='string'?va.localeCompare(vb):Number(va)-Number(vb);
    return s.dir==='asc'?cmp:-cmp;
  });
}
window.sortBy=function(tab,field){
  const cur=sortStates[tab];
  sortStates[tab]={field,dir:(cur?.field===field&&cur.dir==='desc')?'asc':'desc'};
  setTab(tab);
};
function sa(tab,field){
  const s=sortStates[tab];
  if(!s||s.field!==field)return'<span style="opacity:.3">↕</span>';
  return s.dir==='desc'?'↓':'↑';
}
function th(tab,field,label,extra=''){
  return`<th class="sortable${extra?' r':''}" onclick="sortBy('${tab}','${field}')">${label} ${sa(tab,field)}</th>`;
}
function thr(tab,field,label){return th(tab,field,label,'r');}

// ── Stats / alerts ────────────────────────────────────────────────────────
function updateBadge(){
  const b=document.getElementById('live-badge'),lu=document.getElementById('last-updated');
  if(!liveData){b.className='live-badge stale';b.innerHTML='<span class="live-dot"></span>No live data';return;}
  const upd=new Date(liveData.lastUpdated),age=(Date.now()-upd)/36e5;
  b.className='live-badge'+(age>26?' stale':'');
  b.innerHTML=`<span class="live-dot"></span>${age>26?'Stale':'Live'}`;
  lu.textContent='Updated '+upd.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+upd.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  if(liveData.gbpusd)document.getElementById('fx-display').textContent=`GBP/USD ${liveData.gbpusd} · GBP/EUR ${liveData.gbpeur||'-'}`;
}
function updateAlerts(){
  const{en,tt}=computed();
  const al=[];
  en.forEach(p=>{if(p.curPct>10)al.push({t:`⚠ ${p.ticker} = ${p.curPct.toFixed(1)}% of portfolio`,c:'red'});});
  const top=en.filter(p=>p.upside!=null&&p.upside>50&&p.currentHolding>0.5);
  if(top.length)al.push({t:`★ ${top.map(p=>p.ticker).join(', ')} - 50%+ analyst upside`,c:'green'});
  const losing=en.filter(p=>p.unrealisedPLPct!=null&&p.unrealisedPLPct<-20&&p.currentHolding>100);
  if(losing.length)al.push({t:`↓ ${losing.map(p=>p.ticker).join(', ')} - down 20%+ from cost`,c:'amber'});
  const manual=en.filter(p=>p.usingManual&&p.currentHolding>0.5);
  if(manual.length)al.push({t:`🔒 Manual override: ${manual.map(p=>p.ticker).join(', ')} - update £ when holdings change`,c:'amber'});
  document.getElementById('alerts').innerHTML=al.slice(0,6).map(a=>`<div class="alert ${a.c}">${a.t}</div>`).join('');
}
function updateStats(){
  const{tc,pos,tath,tpl,avgUp}=computed();
  document.getElementById('total-val').textContent='£'+tc.toLocaleString(undefined,{maximumFractionDigits:0});
  document.getElementById('stats-band').innerHTML=
    sCard('Positions',pos,TEXT)+
    sCard('Unrealised P&L',(tpl>=0?'+':'')+fgbp(tpl),tpl>=0?POS:NEG)+
    sCard('Total ATH Value','£'+Math.round(tath).toLocaleString(),MUTED)+
    sCard('Wtd Avg Upside',fp(avgUp),avgUp>=0?POS:NEG);
  updateAlerts();
}

function renderReturns(){
  const{en}=computed();
  const held=en.filter(p=>p.currentHolding>0.5);
  // Sort by active field - handle nested returns.* fields
  const s=sortStates['Returns']||{field:'currentHolding',dir:'desc'};
  const sorted=[...held].sort((a,b)=>{
    let va=getVal(a,s.field),vb=getVal(b,s.field);
    if(va==null&&vb==null)return 0;
    if(va==null)return 1;
    if(vb==null)return-1;
    const cmp=typeof va==='string'?va.localeCompare(vb):Number(va)-Number(vb);
    return s.dir==='asc'?cmp:-cmp;
  });
  const rows=sorted.map(p=>`<tr>
    <td><span class="tk-chip">${p.ticker}</span>${p.stale?'<span class="stale-chip">stale</span>':''}</td>
    <td class="muted" style="font-size:10px">${getCatShort(p.category)}</td>
    <td class="r">${fgbp(p.currentHolding)}</td>
    ${RL.map(l=>{const v=p.returns?.[l];return`<td class="r" style="color:${fc(v)};font-weight:${v!=null?700:400}">${fp(v)}</td>`;}).join('')}
  </tr>`).join('');
  return`
  <div class="card"><div class="card-title">Period Returns - Auto-populated Daily</div>
    <div class="chart-hint">Fetched each evening from Yahoo Finance. Click headers to sort. Blank = insufficient price history.</div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        ${th('Returns','ticker','Ticker')}${th('Returns','category','Sector')}
        ${thr('Returns','currentHolding','Holding £')}
        ${RL.map(l=>thr('Returns',`returns.${l}`,l)).join('')}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>
  <div class="card"><div class="card-title">1-Year Return - Best to Worst</div><div id="ret-wrap" style="position:relative"><canvas id="c-ret"></canvas></div></div>
  <div class="card"><div class="card-title">3-Month Return - Best to Worst</div><div id="ret3m-wrap" style="position:relative"><canvas id="c-ret3m"></canvas></div></div>`;
}

// ── Category manager actions ───────────────────────────────────────────────
window.toggleCatPanel=function(){catOpen=!catOpen;setTab('Editor');};
window.updCat=function(id,field,val){
  const c=categories.find(x=>x.id===id);if(!c)return;
  const old=c.fullName;
  c[field]=val;
  if(field==='fullName'&&old!==val){
    portfolio.forEach(p=>{if(p.category===old)p.category=val;});
    savePortfolio();
  }
  saveCategories();updateStats();setTab('Editor');
};
window.delCat=function(id){
  if(!confirm('Delete this category?'))return;
  categories=categories.filter(c=>c.id!==id);
  saveCategories();setTab('Editor');
};
window.addCat=function(){
  const full=document.getElementById('new-cat-full').value.trim();
  const short=document.getElementById('new-cat-short').value.trim();
  const color=document.getElementById('new-cat-color').value;
  if(!full){alert('Please enter a category name');return;}
  const id='c'+Date.now();
  categories.push({id,fullName:full,shortName:short||full.slice(0,8),color});
  saveCategories();setTab('Editor');
};
window.resetCats=function(){
  if(confirm('Reset categories to defaults? Custom categories will be lost.')){
    categories=DEFAULT_CATS.map(c=>({...c}));
    saveCategories();setTab('Editor');
  }
};

// ── Chart drawing ──────────────────────────────────────────────────────────
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch{}});charts={};}

function mkBarH(id,labels,data,colors,cbFn){
  const el=document.getElementById(id);if(!el)return null;
  return new Chart(el,{type:'bar',data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:3}]},options:{...CB,indexAxis:'y',plugins:{...CB.plugins,tooltip:{...CB.plugins.tooltip,callbacks:{label:cbFn}}},scales:{x:{...CB.scales.x,ticks:TS},y:{...CB.scales.y,ticks:TS}}}});
}

function drawCharts(){
  destroyCharts();
  const{en}=computed();
  const doO={...CB,cutout:'60%',plugins:{...CB.plugins,tooltip:{...CB.plugins.tooltip,callbacks:{label:ctx=>` ${ctx.label}: ${ctx.parsed.toFixed(1)}%`}}},scales:{x:{display:false},y:{display:false}}};

  if(activeTab==='Overview'){
    const cs=agg(en,p=>p.curPct);
    const held=en.filter(p=>p.currentHolding>0.5).sort((a,b)=>b.currentHolding-a.currentHolding);
    charts.cp=new Chart(document.getElementById('c-cp'),{type:'doughnut',data:{labels:cs.map(s=>s.name),datasets:[{data:cs.map(s=>s.value),backgroundColor:cs.map(s=>s.color),borderWidth:2,borderColor:'#fff'}]},options:doO});
    charts.tkp=new Chart(document.getElementById('c-tkp'),{type:'doughnut',data:{labels:held.map(p=>p.ticker),datasets:[{data:held.map(p=>p.curPct),backgroundColor:held.map(p=>getCatColor(p.category)),borderWidth:2,borderColor:'#fff'}]},options:doO});
  }
  else if(activeTab==='Upside'){
    const ud=en.filter(p=>p.upside!=null).sort((a,b)=>b.upside-a.upside);
    document.getElementById('up-wrap').style.height=Math.max(ud.length*28+50,150)+'px';
    mkBarH('c-up',ud.map(p=>p.ticker),ud.map(p=>+p.upside.toFixed(1)),ud.map(p=>p.upside>=0?getCatColor(p.category)+'CC':NEG+'CC'),ctx=>{const v=ctx.parsed.x;return` ${v>0?'+':''}${v.toFixed(1)}%`;});
  }
  else if(activeTab==='ATH Analysis'){
    const ad=en.filter(p=>p.athHoldingValue!=null&&p.athHoldingValue>0&&p.currentHolding>0.5).sort((a,b)=>b.athHoldingValue-a.athHoldingValue);
    if(ad.length>0){
      document.getElementById('ath-wrap').style.height=Math.max(ad.length*40+60,150)+'px';
      charts.ath=new Chart(document.getElementById('c-ath'),{type:'bar',data:{labels:ad.map(p=>p.ticker),datasets:[{label:'ATH',data:ad.map(p=>Math.round(p.athHoldingValue)),backgroundColor:NEG+'88',borderRadius:3},{label:'Current',data:ad.map(p=>Math.round(p.currentHolding)),backgroundColor:ACCENT+'CC',borderRadius:3}]},options:{...CB,indexAxis:'y',plugins:{...CB.plugins,tooltip:{...CB.plugins.tooltip,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fgbp(ctx.parsed.x)}`}}},scales:{x:{...CB.scales.x,ticks:{...TS,callback:v=>'£'+(v/1000).toFixed(0)+'k'}},y:{...CB.scales.y,ticks:TS}}}});
    }else{

    mkBarH('c-plpct',wpct.map(p=>p.ticker),wpct.map(p=>p.unrealisedPLPct),wpct.map(p=>p.unrealisedPLPct>=0?getCatColor(p.category)+'CC':NEG+'CC'),ctx=>{const v=ctx.parsed.x;return` ${v>=0?'+':''}${v.toFixed(2)}%`;});

// ── Init ──────────────────────────────────────────────────────────────────
async function init(){
  loadCategories();
  // Migrate from older localStorage keys if present
  const raw=localStorage.getItem('t212-portfolio-v1')
    ||localStorage.getItem('craigside-portfolio-v1')
    ||localStorage.getItem('cp-v3')
    ||localStorage.getItem('cp-file-v1');
  try{
    portfolio=raw?JSON.parse(raw).map(p=>({...p})):INIT_PORTFOLIO.map(p=>({...p}));
  }catch{
    portfolio=INIT_PORTFOLIO.map(p=>({...p}));
  }
  // Robust nextId - handles missing/NaN ids
  const ids=portfolio.map(p=>parseInt(p.id)).filter(n=>!isNaN(n));
  nextId=(ids.length?Math.max(...ids):30)+1;
  await fetchLiveData();
  // Sync watchlist tickers from data.json (cross-device sync)
  if(liveData&&liveData.watchlist){
    const _wl=wlPortfolio();
    const _ex=new Set(_wl.map(x=>x.ticker));
    let _mid=_wl.reduce((m,x)=>Math.max(m,x.id||0),0);
    let _chg=false;
    Object.keys(liveData.watchlist).forEach(t=>{if(!_ex.has(t)){_wl.push({id:++_mid,ticker:t,category:'Other',targetPct:0});_chg=true;}});
    if(_chg){const _k='t212-watch'+'list-v1';window[atob('bG9jYWxTdG9yYWdl')].setItem(_k,JSON.stringify(_wl));}
  }

  document.getElementById('loading-overlay').style.display='none';
  updateBadge();
  document.getElementById('tab-bar').innerHTML=TABS.map(t=>`<button class="tab" data-tab="${t}" onclick="setTab('${t}')">${t}</button>`).join('');
  updateStats();setTab('Overview');
}

function wlAutoCategory(t){const s=(wlData(t).sector||'');const m={'Technology':'Technology','Information Technology':'Technology','Healthcare':'Healthcare','Financial Services':'Financials','Consumer Cyclical':'Consumer','Consumer Defensive':'Consumer','Energy':'Energy','Utilities':'Utilities','Basic Materials':'Materials','Communication Services':'Comms','Industrials':'Industrials','Real Estate':'Real Estate'};return m[s]||s||'Other';}
function heatColor(v){if(v===null||v===undefined)return '';const a=Math.min(Math.abs(v),30)/30*0.7+0.15;return v>=0?'rgba(22,163,74,'+a.toFixed(2)+')':'rgba(220,38,38,'+a.toFixed(2)+')';}
function heatTd(v){if(v===null||v===undefined)return '<td class="heat-td" style="color:#94A3B8">-</td>';const bg=heatColor(v);const fc=Math.abs(v)>15?'#fff':'#0F172A';return '<td class="heat-td" style="background:'+bg+';color:'+fc+'">'+(v>=0?'+':'')+v.toFixed(2)+'%</td>';}
function thSort(tab,field,label,align){const st=wlSortStates[tab]||{};const arr=st.field===field?(st.dir==='asc'?'^':'v'):'';return '<th onclick="wlSortBy(&#39;'+tab+'&#39;,&#39;'+field+'&#39;)" class="sortable" style="text-align:'+align+';padding:9px 8px;cursor:pointer">'+label+' '+arr+'</th>';}
function wlApplySort(items,tab,def){const st=wlSortStates[tab]||{field:def,dir:'desc'};return [...items].sort(function(a,b){const get=function(o,f){return f.split('.').reduce(function(x,k){return x&&x[k];},o);};let va=get(a,st.field),vb=get(b,st.field);va=va===null||va===undefined?-Infinity:va;vb=vb===null||vb===undefined?-Infinity:vb;return st.dir==='asc'?(va>vb?1:va<vb?-1:0):(va<vb?1:va>vb?-1:0);});}

  const cats=[...(new Set([...p.map(function(x){return x.category;}),'Technology','Healthcare','Financials','Consumer','Energy','Materials','Comms','Industrials','Real Estate','Other'].filter(Boolean)))].sort();
  const rows=p.map(function(item){const d=wlData(item.ticker);const opts=cats.map(function(c){return '<option value="'+c+'"'+(item.category===c?' selected':'')+'>'+c+'</option>';}).join('');return '<tr><td style="padding:6px 8px"><input value="'+item.ticker+'" style="width:72px;font-family:\'Courier New\',monospace;font-size:13px;font-weight:700;text-transform:uppercase;border:1px solid #CBD5E1;border-radius:6px;padding:3px 6px" onchange="wlEditField('+item.id+',&#39;ticker&#39;,this.value.toUpperCase().trim())"></td><td style="padding:6px 8px"><select onchange="wlEditField('+item.id+',&#39;category&#39;,this.value)" style="font-family:\'Courier New\',monospace;font-size:11px;border:1px solid #CBD5E1;border-radius:6px;padding:3px 6px">'+opts+'</select><button class="btn btn-grey btn-sm" onclick="wlAutoAssignCat('+item.id+')" style="margin-left:6px;font-size:10px" title="Auto from yfinance sector">Auto</button></td><td style="padding:6px 10px;font-size:12px;color:#64748B">'+(d.price?'$'+d.price.toFixed(2):'-')+'</td><td style="padding:6px 8px"><button class="btn btn-grey btn-sm" onclick="wlRemove('+item.id+')" style="color:#DC2626">✕</button></td></tr>';}).join('');
  el.innerHTML='<div class="card"><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr style="background:#F8FAFC;font-size:10px;color:#64748B;text-transform:uppercase"><th style="padding:9px 8px;text-align:left">TICKER</th><th style="padding:9px 8px;text-align:left">CATEGORY</th><th style="padding:9px 8px;text-align:left">PRICE</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div><div style="margin-top:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap"><input id="wl-new-ticker" placeholder="e.g. TSLA" style="font-family:\'Courier New\',monospace;font-size:13px;font-weight:700;text-transform:uppercase;border:1px solid #CBD5E1;border-radius:8px;padding:6px 10px;width:150px" onkeydown="if(event.key===&#39;Enter&#39;)wlAddTicker()"><button class="btn" onclick="wlAddTicker()" style="background:#1D4ED8;color:#fff">+ Add Ticker</button><button class="btn btn-grey" onclick="wlExportJSON()">⬇ Download watchlist.json</button></div></div>';
}
function wlEditField(id,field,val){const p=wlPortfolio();const item=p.find(function(x){return x.id===id;});if(item){item[field]=val;saveWlPortfolio(p);}}
function wlAutoAssignCat(id){const p=wlPortfolio();const item=p.find(function(x){return x.id===id;});if(item){item.category=wlAutoCategory(item.ticker);saveWlPortfolio(p);}}
function wlRemove(id){if(!confirm('Remove this ticker?'))return;saveWlPortfolio(wlPortfolio().filter(function(x){return x.id!==id;}));}
function wlAddTicker(){const inp=document.getElementById('wl-new-ticker');const t=(inp.value||'').toUpperCase().trim();if(!t)return;const p=wlPortfolio();const maxId=p.reduce(function(m,x){return Math.max(m,x.id||0);},0);p.push({id:maxId+1,ticker:t,category:wlAutoCategory(t),targetPct:0});saveWlPortfolio(p);inp.value='';}
function wlExportJSON(){const tickers=wlPortfolio().map(function(x){return x.ticker;});const a=document.createElement('a');a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(tickers,null,2));a.download='watchlist.json';a.click();}

init().catch(err=>{
  const ov=document.getElementById('loading-overlay');
  if(ov){ov.style.background='#fff';ov.innerHTML='<div style="color:#DC2626;font-family:monospace;padding:24px;max-width:800px;white-space:pre-wrap"><strong>Dashboard error — please report this:</strong>\n'+err.stack+'</div>';}
  console.error('init() failed:',err);
});
</script>
</body>
</html>
