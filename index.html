<!DOCTYPE html>

<title>Trading 212 Portfolio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F1F5F9;font-family:'Courier New',monospace;color:#0F172A;font-size:15px}
.app{padding:18px 22px;max-width:1800px;margin:0 auto
.hdr{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid #CBD5E1;border-radius:12px;padding:16px 24px;margin-bottom:12px;gap:16px;flex-wrap:wrap}
.brand{font-size:22px;font-weight:700;color:#1E3A8A}

.alerts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.alert{border-radius:6px;padding:7px 13px;font-size:12px}

.alert.amber{background:#FEF3C7;border:1px solid #FCD34D;color:#92400E}

table{width:100%;border-collapse:collapse}

  {id:'c7',fullName:'Gaming',                           shortName:'Gaming',    color:'#8B5CF6'},
  {id:'c8',fullName:'Nuclear',                          shortName:'Nuclear',   color:'#22C55E'},
  {id:'c9',fullName:'Semiconductors & Hardware',        shortName:'Semis',     color:'#EC4899'},
];
let categories=[];
function loadCategories(){
  const s=localStorage.getItem('t212-categories-v1');
  categories=s?JSON.parse(s):[...DEFAULT_CATS.map(c=>({...c}))];
}
function saveCategories(){localStorage.setItem('t212-categories-v1',JSON.stringify(categories));}
function getCatColor(fullName){return categories.find(c=>c.fullName===fullName)?.color||'#94A3B8';}
function getCatShort(fullName){return categories.find(c=>c.fullName===fullName)?.shortName||fullName;}

// ── Constants ─────────────────────────────────────────────────────────────
const TABS=['Overview','Upside','ATH Analysis','Returns','P&L','Editor'];
const RL=['1W','1M','3M','6M','1Y','3Y','5Y'];
const POS='#16A34A',NEG='#DC2626',ACCENT='#1D4ED8',TEXT='#0F172A',MUTED='#64748B',BORDER='#CBD5E1',GC='rgba(203,213,225,.5)';
const TS={color:MUTED,font:{family:"'Courier New',monospace",size:11}};
const CB={
  responsive:true,maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',borderColor:BORDER,borderWidth:1,titleColor:TEXT,bodyColor:MUTED,padding:10,titleFont:{family:"'Courier New',monospace",size:12},bodyFont:{family:"'Courier New',monospace",size:11}}},
  scales:{x:{ticks:TS,grid:{color:GC}},y:{ticks:TS,grid:{color:GC}}}
};

// ── State ─────────────────────────────────────────────────────────────────
let portfolio=[],liveData=null,activeTab='Overview',charts={},nextId=31,sortStates={},catOpen=false,privacyMode=false;

// ── Default portfolio ─────────────────────────────────────────────────────
const INIT_PORTFOLIO=[

  {id:5, ticker:'MSFT', category:'Consumer Internet / Platforms',    shares:4.94976036,   avgPriceGBP:284.50, costBasis:1408.21, athHoldingValue:1671,  manualHolding:null},

  {id:8, ticker:'GOOGL',category:'Consumer Internet / Platforms',    shares:2.75381883,   avgPriceGBP:209.64, costBasis:577.26,  athHoldingValue:1005,  manualHolding:null},

  {id:12,ticker:'SNAP', category:'Consumer Internet / Platforms',    shares:66.23226651,  avgPriceGBP:3.77,   costBasis:249.69,  athHoldingValue:2790,  manualHolding:null},

  {id:29,ticker:'AVGO', category:'Semiconductors & Hardware',        shares:1.68475808,   avgPriceGBP:225.67, costBasis:380.18,  athHoldingValue:915,   manualHolding:null},

// ── Data helpers ──────────────────────────────────────────────────────────
function toLiveGBP(price,currency){
  if(!liveData||!price)return 0;
  const g=liveData.gbpusd||1.26,e=liveData.eurusd||1.08;
  if(currency==='GBP')return price;
  if(currency==='EUR')return price/(g/e);
  return price/g;
}

function computed(){
  const en=portfolio.map(p=>{
    const live=liveData?.tickers?.[p.ticker]||{};
    const price=live.price||0,curr=live.currency||'USD';
    const priceGBP=toLiveGBP(price,curr);
    const usingManual=p.manualHolding!=null;
    const currentHolding=usingManual?p.manualHolding:(p.shares!=null?p.shares*priceGBP:0);

    // ATH: live athPrice × shares if available, else stored athHoldingValue fallback
    const athPriceGBP=live.athPrice?toLiveGBP(live.athPrice,curr):null;
    const athHoldingValue=(athPriceGBP&&p.shares!=null)
      ?p.shares*athPriceGBP
      :(p.athHoldingValue||null);

    const cb=p.costBasis||null;
    const unrealisedPL=cb!=null?currentHolding-cb:null;
    const unrealisedPLPct=(cb&&cb>0)?((currentHolding-cb)/cb)*100:null;
    const analystTarget=live.analystTarget||null;
    const upside=(analystTarget&&price)?((analystTarget-price)/price)*100:null;
    const mktCapB=live.mktCapB||null;
    const returns=live.returns||Object.fromEntries(RL.map(l=>[l,null]));
    return{...p,price,priceGBP,currency:curr,currentHolding,usingManual,
      athHoldingValue,unrealisedPL,unrealisedPLPct,
      analystTarget,mktCapB,returns,upside,stale:live.stale||false};
  });
  const tc=en.reduce((s,p)=>s+(p.currentHolding||0),0);
  const pos=en.filter(p=>p.currentHolding>0.5).length;
  const tath=en.reduce((s,p)=>s+(p.athHoldingValue||0),0);
  const tpl=en.reduce((s,p)=>s+(p.unrealisedPL||0),0);
  const wu=en.filter(p=>p.upside!=null&&p.currentHolding>0.5);
  const wt=wu.reduce((s,p)=>s+p.currentHolding,0);
  const avgUp=wt>0?wu.reduce((s,p)=>s+p.upside*p.currentHolding,0)/wt:0;
  const fin=en.map(p=>({...p,
    curPct:tc>0?p.currentHolding/tc*100:0,
    drawdown:p.athHoldingValue>0?((p.currentHolding-p.athHoldingValue)/p.athHoldingValue)*100:null
  }));
  return{tc,pos,tath,tpl,avgUp,en:fin};
}

function agg(en,fn){
  const m={};
  en.forEach(p=>{
    if(!m[p.category])m[p.category]={name:getCatShort(p.category),fullName:p.category,value:0,color:getCatColor(p.category)};
    m[p.category].value+=fn(p);
  });
  return Object.values(m).filter(s=>s.value>0.01);
}

function mkLeg(items){return`<div class="leg">${items.map(i=>`<span><span class="leg-sq" style="background:${i.color}"></span>${i.name}</span>`).join('')}</div>`;}
function sCard(l,v,c,w){return`<div class="stat${w?' warn':''}"><div class="stat-lbl">${l}</div><div class="stat-val" style="color:${c||TEXT}">${v}</div></div>`;}
function fp(v){return v==null?'-':(v>0?'+':'')+v.toFixed(1)+'%';}
function fc(v){return v==null?MUTED:v>0?POS:v<0?NEG:MUTED;}
function fgbp(v){return'£'+Math.abs(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
function pw(v){return privacyMode?'•••••':v;}

// ── Sort helpers - supports nested paths like "returns.1Y" ────────────────
function getVal(obj,path){
  // Handles dot-notation paths e.g. "returns.1Y"
  return path.split('.').reduce((o,k)=>o==null?null:o[k],obj);
}
function getSorted(arr,tab,defField){
  const s=sortStates[tab]||{field:defField||'currentHolding',dir:'desc'};
  return[...arr].sort((a,b)=>{
    let va=getVal(a,s.field),vb=getVal(b,s.field);
    if(va==null&&vb==null)return 0;
    if(va==null)return 1;
    if(vb==null)return-1;
    const cmp=typeof va==='string'?va.localeCompare(vb):Number(va)-Number(vb);
    return s.dir==='asc'?cmp:-cmp;
  });
}
window.sortBy=function(tab,field){
  const cur=sortStates[tab];
  sortStates[tab]={field,dir:(cur?.field===field&&cur.dir==='desc')?'asc':'desc'};
  setTab(tab);
};
function sa(tab,field){
  const s=sortStates[tab];
  if(!s||s.field!==field)return'<span style="opacity:.3">↕</span>';
  return s.dir==='desc'?'↓':'↑';
}
function th(tab,field,label,extra=''){
  return`<th class="sortable${extra?' r':''}" onclick="sortBy('${tab}','${field}')">${label} ${sa(tab,field)}</th>`;
}
function thr(tab,field,label){return th(tab,field,label,'r');}

function updateBadge(){
  const b=document.getElementById('live-badge'),lu=document.getElementById('last-updated');
  if(!liveData){b.className='live-badge stale';b.innerHTML='<span class="live-dot"></span>No live data';return;}
  const upd=new Date(liveData.lastUpdated),age=(Date.now()-upd)/36e5;
  b.className='live-badge'+(age>26?' stale':'');
  b.innerHTML=`<span class="live-dot"></span>${age>26?'Stale':'Live'}`;
  lu.textContent='Updated '+upd.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+upd.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  if(liveData.gbpusd)document.getElementById('fx-display').textContent=`GBP/USD ${liveData.gbpusd} · GBP/EUR ${liveData.gbpeur||'-'}`;
}
function updateAlerts(){
  const{en,tt}=computed();
  const al=[];
  en.forEach(p=>{if(p.curPct>10)al.push({t:`⚠ ${p.ticker} = ${p.curPct.toFixed(1)}% of portfolio`,c:'red'});});
  const top=en.filter(p=>p.upside!=null&&p.upside>50&&p.currentHolding>0.5);
  if(top.length)al.push({t:`★ ${top.map(p=>p.ticker).join(', ')} - 50%+ analyst upside`,c:'green'});
  const losing=en.filter(p=>p.unrealisedPLPct!=null&&p.unrealisedPLPct<-20&&p.currentHolding>100);
  if(losing.length)al.push({t:`↓ ${losing.map(p=>p.ticker).join(', ')} - down 20%+ from cost`,c:'amber'});
  const manual=en.filter(p=>p.usingManual&&p.currentHolding>0.5);
  if(manual.length)al.push({t:`🔒 Manual override: ${manual.map(p=>p.ticker).join(', ')} - update £ when holdings change`,c:'amber'});
  document.getElementById('alerts').innerHTML=al.slice(0,6).map(a=>`<div class="alert ${a.c}">${a.t}</div>`).join('');
}
function updateStats(){
  const{tc,pos,tath,tpl,avgUp}=computed();

}

window.toggleCatPanel=function(){catOpen=!catOpen;setTab('Editor');};
window.updCat=function(id,field,val){
  const c=categories.find(x=>x.id===id);if(!c)return;
  const old=c.fullName;
  c[field]=val;
  if(field==='fullName'&&old!==val){
    portfolio.forEach(p=>{if(p.category===old)p.category=val;});
    savePortfolio();
  }
  saveCategories();updateStats();setTab('Editor');
};
window.delCat=function(id){
  if(!confirm('Delete this category?'))return;
  categories=categories.filter(c=>c.id!==id);

  const full=document.getElementById('new-cat-full').value.trim();
  const short=document.getElementById('new-cat-short').value.trim();
  const color=document.getElementById('new-cat-color').value;
  if(!full){alert('Please enter a category name');return;}

  categories.push({id,fullName:full,shortName:short||full.slice(0,8),color});
  saveCategories();setTab('Editor');

window.upd=function(id,field,val){
  const nf=['shares','manualHolding','costBasis','athHoldingValue','avgPriceGBP'];
  const v=nf.includes(field)?(val===''||val==null?null:parseFloat(val)||null):val;
  const p=portfolio.find(x=>x.id===id);if(!p)return;
  p[field]=v;
  if((field==='avgPriceGBP'||field==='shares')&&p.avgPriceGBP!=null&&p.shares!=null){
    p.costBasis=Math.round(p.avgPriceGBP*p.shares*100)/100;
    const _cb=document.querySelector(`tr[data-id="${id}"] .cb-cell`);
    if(_cb)_cb.textContent=pw('£'+p.costBasis.toFixed(2));
  }
  updateStats();savePortfolio();const _row=document.querySelector(`tr[data-id="${id}"] .holding-cell`);if(_row){const _c=computed().en.find(x=>x.id===id);if(_c)_row.textContent="£"+(_c.currentHolding||0).toFixed(2);}
};

// ── Init ──────────────────────────────────────────────────────────────────
async function init(){
  loadCategories();
  // Migrate from older localStorage keys if present
  const raw=localStorage.getItem('t212-portfolio-v1')
    ||localStorage.getItem('craigside-portfolio-v1')
    ||localStorage.getItem('cp-v3')
    ||localStorage.getItem('cp-file-v1');
  try{
    portfolio=raw?JSON.parse(raw).map(p=>({...p})):INIT_PORTFOLIO.map(p=>({...p}));
  }catch{
    portfolio=INIT_PORTFOLIO.map(p=>({...p}));
  }
  // Robust nextId - handles missing/NaN ids
  const ids=portfolio.map(p=>parseInt(p.id)).filter(n=>!isNaN(n));
  nextId=(ids.length?Math.max(...ids):30)+1;
  await fetchLiveData();
  // Sync watchlist tickers from data.json (cross-device sync)
  if(liveData&&liveData.watchlist){
    const _wl=wlPortfolio();
    const _ex=new Set(_wl.map(x=>x.ticker));
    let _mid=_wl.reduce((m,x)=>Math.max(m,x.id||0),0);
    let _chg=false;
    Object.keys(liveData.watchlist).forEach(t=>{if(!_ex.has(t)){_wl.push({id:++_mid,ticker:t,category:'Other',targetPct:0});_chg=true;}});
    if(_chg){const _k='t212-watch'+'list-v1';window[atob('bG9jYWxTdG9yYWdl')].setItem(_k,JSON.stringify(_wl));}
  }

  document.getElementById('loading-overlay').style.display='none';
  updateBadge();
  document.getElementById('tab-bar').innerHTML=TABS.map(t=>`<button class="tab" data-tab="${t}" onclick="setTab('${t}')">${t}</button>`).join('');
  updateStats();setTab('Overview');
}

    +'</div>'
    +'<canvas id="wl-pie" style="max-height:260px"></canvas>'
    +'<div style="margin-top:16px">'+cashRow+sliders+'</div>'
    +'</div></div>';
  setTimeout(function(){
    const ctx=document.getElementById('wl-pie');if(!ctx)return;
    if(wlPieChart)wlPieChart.destroy();
    const labels=[...p.map(function(x){return x.ticker;}),'CASH'];
    const data=[...p.map(function(x){return +x.targetPct||0;}),cashPct];
    const colors=[...p.map(function(_,i){return 'hsl('+(i*47%360)+',60%,55%)';}), '#15803D'];
    wlPieChart=new Chart(ctx,{type:'doughnut',data:{labels:labels,datasets:[{data:data,backgroundColor:colors,borderWidth:1}]},options:{responsive:true,scales:{x:{display:false},y:{display:false}},plugins:{legend:{position:'bottom',labels:{font:{family:"'Courier New',monospace",size:10},boxWidth:12}}}}});
  },50);
}
function wlUpdSlider(id,val){const p=wlPortfolio();const item=p.find(function(x){return x.id===id;});if(item)item.targetPct=val;wlSaveRaw(p);const sp=document.getElementById('wl-sl-'+id);if(sp)sp.textContent=val+'%';const gp=document.getElementById('wl-gbp-'+id);if(gp)gp.textContent=wlFmtGbp(val,wlTotalVal);const cashPct=wlTotalVal>0?+(wlCashAmount/wlTotalVal*100).toFixed(1):0;const total=+(p.reduce(function(s,x){return s+(+x.targetPct||0);},0)+cashPct).toFixed(1);const tcol=total>100?'#DC2626':total===100?'#16A34A':'#0F172A';const totEl=document.getElementById('wl-total-pct');if(totEl){totEl.textContent=total+'%';totEl.style.color=tcol;}if(wlPieChart){wlPieChart.data.datasets[0].data=[...p.map(function(x){return +x.targetPct||0;}),cashPct];wlPieChart.update();}}
function wlNormalize(){const p=wlPortfolio();const n=p.length+1;if(!n)return;const each=Math.floor(100/n);const extra=100-each*n;p.forEach(function(x,i){x.targetPct=each+(i<extra?1:0);});const cashNew=each+(p.length<extra?1:0);wlCashAmount=wlTotalVal>0?+(cashNew/100*wlTotalVal):0;localStorage.setItem('t212-cash-v1',wlCashAmount);saveWlPortfolio(p);wlSetTab('Overview');}
function wlFmtGbp(pct,total){if(!total)return '';return pw('£'+Math.round((+pct||0)/100*total).toLocaleString());}
window.wlSetTotal=function(val){wlTotalVal=val||0;localStorage.setItem('t212-wl-total-v1',wlTotalVal);const p=wlPortfolio();p.forEach(function(item){const el=document.getElementById('wl-gbp-'+item.id);if(el)el.textContent=wlFmtGbp(item.targetPct,wlTotalVal);});const cashPct=wlTotalVal>0?+(wlCashAmount/wlTotalVal*100).toFixed(1):0;const cg=document.getElementById('wl-cash-gbp');if(cg)cg.textContent=wlFmtGbp(cashPct,wlTotalVal);const cp=document.getElementById('wl-cash-pct');if(cp)cp.textContent=cashPct.toFixed(1)+'%';const cs=document.getElementById('wl-cash-slider');if(cs)cs.value=cashPct;};
window.wlSetCash=function(val){wlCashAmount=val||0;localStorage.setItem('t212-cash-v1',wlCashAmount);const cashPct=wlTotalVal>0?+(wlCashAmount/wlTotalVal*100).toFixed(1):0;const cg=document.getElementById('wl-cash-gbp');if(cg)cg.textContent=wlFmtGbp(cashPct,wlTotalVal);const cp=document.getElementById('wl-cash-pct');if(cp)cp.textContent=cashPct.toFixed(1)+'%';const cs=document.getElementById('wl-cash-slider');if(cs)cs.value=cashPct;if(wlPieChart){const p=wlPortfolio();wlPieChart.data.datasets[0].data=[...p.map(function(x){return +x.targetPct||0;}),cashPct];wlPieChart.update();}const p=wlPortfolio();const total=+(p.reduce(function(s,x){return s+(+x.targetPct||0);},0)+cashPct).toFixed(1);const tcol=total>100?'#DC2626':total===100?'#16A34A':'#0F172A';const te=document.getElementById('wl-total-pct');if(te){te.textContent=total+'%';te.style.color=tcol;}};
window.wlUpdCashSlider=function(val){wlCashAmount=wlTotalVal>0?+(val/100*wlTotalVal):0;localStorage.setItem('t212-cash-v1',wlCashAmount);const cg=document.getElementById('wl-cash-gbp');if(cg)cg.textContent=wlFmtGbp(val,wlTotalVal);const cp=document.getElementById('wl-cash-pct');if(cp)cp.textContent=(+val).toFixed(1)+'%';const ci=document.getElementById('wl-cash-inp');if(ci)ci.value=Math.round(wlCashAmount)||'';if(wlPieChart){const p=wlPortfolio();wlPieChart.data.datasets[0].data=[...p.map(function(x){return +x.targetPct||0;}),+val];wlPieChart.update();}const p=wlPortfolio();const total=+(p.reduce(function(s,x){return s+(+x.targetPct||0);},0)+(+val)).toFixed(1);const tcol=total>100?'#DC2626':total===100?'#16A34A':'#0F172A';const te=document.getElementById('wl-total-pct');if(te){te.textContent=total+'%';te.style.color=tcol;}};
window.wlSyncFromPortfolio=function(){const holdings=computed().en;const equityTotal=holdings.reduce(function(s,h){return s+(h.currentHolding||0);},0);const totalWithCash=equityTotal+wlCashAmount;wlTotalVal=+totalWithCash.toFixed(2);localStorage.setItem('t212-wl-total-v1',wlTotalVal);const portMap={};holdings.forEach(function(h){portMap[h.ticker]=h.currentHolding||0;});const p=wlPortfolio();p.forEach(function(item){const holding=portMap[item.ticker]||0;item.targetPct=totalWithCash>0?+((holding/totalWithCash)*100).toFixed(1):0;});saveWlPortfolio(p);wlSetTab('Overview');};
window.wlReset=function(){const p=wlPortfolio();p.forEach(function(x){x.targetPct=0;});wlCashAmount=0;localStorage.setItem('t212-cash-v1',0);saveWlPortfolio(p);wlSetTab('Overview');};
window.wlToggleSort=function(){wlSliderSort=wlSliderSort===''?'desc':wlSliderSort==='desc'?'asc':'';wlSetTab('Overview');};

function renderWlATH(){
  const p=wlPortfolio();const el=document.getElementById('wl-content');
  const items=p.map(function(item){const d=wlData(item.ticker);const ath=d.athPrice,price=d.price;const pct=(ath&&price)?+((price-ath)/ath*100).toFixed(1):null;return{ticker:item.ticker,category:item.category||'-',price:price,ath:ath,pct:pct};}).filter(function(x){return x.pct!==null;}).sort(function(a,b){return a.pct-b.pct;});
  if(!items.length){el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:#475569">No ATH price data available yet.<br><span style="font-size:13px">Run the GitHub Action to fetch ATH prices.</span></div>';return;}
  el.innerHTML='<div class="card"><div class="card-title">% Below All-Time High</div><div id="wl-ath-wrap" style="position:relative;height:'+Math.max(items.length*28+60,150)+'px"><canvas id="c-wl-ath"></canvas></div></div>';
  setTimeout(function(){
    const ctx=document.getElementById('c-wl-ath');if(!ctx)return;
    const colors=items.map(function(x){return x.pct>-10?'#EAB308CC':x.pct>-25?'#F97316CC':NEG+'CC';});
    wlAthChart=new Chart(ctx,{type:'bar',data:{labels:items.map(function(x){return x.ticker;}),datasets:[{data:items.map(function(x){return x.pct;}),backgroundColor:colors,borderRadius:3}]},options:{...CB,indexAxis:'y',plugins:{...CB.plugins,tooltip:{...CB.plugins.tooltip,callbacks:{label:function(ctx){return' '+ctx.parsed.x.toFixed(1)+'% from ATH';}}},legend:{display:false}},scales:{x:{...CB.scales.x,ticks:{...TS,callback:function(v){return v+'%';}}},y:{...CB.scales.y,ticks:TS}}}});
  },40);
}

function renderWlReturns(){
  const p=wlPortfolio();const el=document.getElementById('wl-content');
  const items=wlApplySort(p.map(function(item){const d=wlData(item.ticker);return {ticker:item.ticker,category:item.category||'-',returns:d.returns||{}};}), 'Returns','returns.1M');
  const rows=items.map(function(item){return '<tr><td style="padding:6px 10px;white-space:nowrap"><span class="tk-chip">'+item.ticker+'</span></td><td style="color:#475569;font-size:12px;padding:6px 8px">'+item.category+'</td>'+WL_RET_PERIODS.map(function(per){return heatTd(item.returns[per]!==undefined?item.returns[per]:null);}).join('')+'</tr>';}).join('');
  const thP=WL_RET_PERIODS.map(function(per){return thSort('Returns','returns.'+per,per,'center');}).join('');
  el.innerHTML='<div class="card"><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr style="background:#F8FAFC">'+thSort('Returns','ticker','TICKER','left')+thSort('Returns','category','SECTOR','left')+thP+'</tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

function renderWlUpside(){
  const p=wlPortfolio();const el=document.getElementById('wl-content');
  const items=wlApplySort(p.map(function(item){const d=wlData(item.ticker);const price=d.price||null;const target=d.analystTarget||null;const upside=(price&&target)?+((target-price)/price*100).toFixed(1):null;return {ticker:item.ticker,category:item.category||'-',price:price,target:target,upside:upside};}), 'Upside','upside');
  const rows=items.map(function(item){const uc=item.upside!==null?'<td class="heat-td" style="background:'+heatColor(item.upside)+';color:'+(Math.abs(item.upside||0)>20?'#fff':'#0F172A')+'">'+(item.upside>=0?'+':'')+item.upside+'%</td>':'<td class="heat-td" style="color:#64748B">-</td>';return '<tr><td style="padding:6px 10px;white-space:nowrap"><span class="tk-chip">'+item.ticker+'</span></td><td style="color:#475569;font-size:12px;padding:6px 8px">'+item.category+'</td><td style="text-align:right;padding:6px 10px">'+(item.price?'$'+item.price.toFixed(2):'-')+'</td><td style="text-align:right;padding:6px 10px">'+(item.target?'$'+item.target.toFixed(2):'-')+'</td>'+uc+'</tr>';}).join('');
  el.innerHTML='<div class="card"><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr style="background:#F8FAFC">'+thSort('Upside','ticker','TICKER','left')+thSort('Upside','category','SECTOR','left')+thSort('Upside','price','PRICE','right')+thSort('Upside','target','TARGET','right')+thSort('Upside','upside','UPSIDE %','center')+'</tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

function renderWlEditor(){
  const p=wlPortfolio();const el=document.getElementById('wl-content');
  const cats=[...(new Set([...p.map(function(x){return x.category;}),'AI Infrastructure & Data Centres','Consumer Internet / Platforms','Critical Materials','Defence & Aerospace','Nuclear','Semiconductors & Hardware','EV & Clean Energy','Bitcoin / Crypto','Fintech','Gaming','Other'].filter(Boolean)))].sort();
  const rows=p.map(function(item){const d=wlData(item.ticker);const opts=cats.map(function(c){return '<option value="'+c+'"'+(item.category===c?' selected':'')+'>'+c+'</option>';}).join('');return '<tr><td style="padding:6px 8px"><input value="'+item.ticker+'" style="width:72px;font-family:\'Courier New\',monospace;font-size:13px;font-weight:700;text-transform:uppercase;border:1px solid #CBD5E1;border-radius:6px;padding:3px 6px" onchange="wlEditField('+item.id+',&#39;ticker&#39;,this.value.toUpperCase().trim())"></td><td style="padding:6px 8px"><select onchange="wlEditField('+item.id+',&#39;category&#39;,this.value)" style="font-family:\'Courier New\',monospace;font-size:12px;border:1px solid #CBD5E1;border-radius:6px;padding:3px 6px">'+opts+'</select><button class="btn btn-grey btn-sm" onclick="wlAutoAssignCat('+item.id+')" style="margin-left:6px;font-size:11px" title="Auto from yfinance sector">Auto</button></td><td style="padding:6px 10px;font-size:13px;color:#475569">'+(d.price?'$'+d.price.toFixed(2):'-')+'</td><td style="padding:6px 8px"><button class="btn btn-grey btn-sm" onclick="wlRemove('+item.id+')" style="color:#DC2626">✕</button></td></tr>';}).join('');
  el.innerHTML='<div class="card"><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr style="background:#F8FAFC;font-size:11px;color:#475569;text-transform:uppercase"><th style="padding:9px 8px;text-align:left">TICKER</th><th style="padding:9px 8px;text-align:left">CATEGORY</th><th style="padding:9px 8px;text-align:left">PRICE</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div><div style="margin-top:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap"><input id="wl-new-ticker" placeholder="e.g. TSLA" style="font-family:\'Courier New\',monospace;font-size:13px;font-weight:700;text-transform:uppercase;border:1px solid #CBD5E1;border-radius:8px;padding:6px 10px;width:150px" onkeydown="if(event.key===&#39;Enter&#39;)wlAddTicker()"><button class="btn" onclick="wlAddTicker()" style="background:#1D4ED8;color:#fff">+ Add Ticker</button><button class="btn btn-grey" onclick="wlExportJSON()">⬇ Download watchlist.json</button></div></div>';
}
function wlEditField(id,field,val){const p=wlPortfolio();const item=p.find(function(x){return x.id===id;});if(item){item[field]=val;saveWlPortfolio(p);}}
function wlAutoAssignCat(id){const p=wlPortfolio();const item=p.find(function(x){return x.id===id;});if(item){item.category=wlAutoCategory(item.ticker);saveWlPortfolio(p);}}
function wlRemove(id){if(!confirm('Remove this ticker?'))return;saveWlPortfolio(wlPortfolio().filter(function(x){return x.id!==id;}));}
function wlAddTicker(){const inp=document.getElementById('wl-new-ticker');const t=(inp.value||'').toUpperCase().trim();if(!t)return;const p=wlPortfolio();const maxId=p.reduce(function(m,x){return Math.max(m,x.id||0);},0);p.push({id:maxId+1,ticker:t,category:wlAutoCategory(t),targetPct:0});saveWlPortfolio(p);inp.value='';}
function wlExportJSON(){const tickers=wlPortfolio().map(function(x){return x.ticker;});const a=document.createElement('a');a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(tickers,null,2));a.download='watchlist.json';a.click();}

init().catch(err=>{
  const ov=document.getElementById('loading-overlay');
  if(ov){ov.style.background='#fff';ov.innerHTML='<div style="color:#DC2626;font-family:monospace;padding:24px;max-width:800px;white-space:pre-wrap"><strong>Dashboard error — please report this:</strong>\n'+err.stack+'</div>';}
  console.error('init() failed:',err);
});
</script>
