name: Update Portfolio Data

# Runs automatically after US market close (weekdays only)
# Can also be triggered manually from the Actions tab in GitHub
on:
  schedule:
    # 9:30pm UTC = 10:30pm BST / 4:30pm ET — safely after NYSE close
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # Manual trigger button in GitHub Actions tab

# Required so the bot can commit data.json back to the repo
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch market data
        run: python fetch_data.py

      - name: Commit and push data.json
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          # Only commit if data.json actually changed
          git diff --staged --quiet || git commit -m "📈 Portfolio data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
